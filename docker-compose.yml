services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vastgoed-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=Developer
      - MSSQL_MEMORY_LIMIT_MB=2048
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - vastgoed-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD:-YourStrong!Passw0rd}' -Q 'SELECT 1' -C || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # .NET API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vastgoed-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Password=password
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=VastgoedDB;User=sa;Password=${SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=true;
      - Authentication__Schemes__Bearer__Authority=https://${AUTH0_DOMAIN:-YOUR_AUTH0_DOMAIN.auth0.com}/
      - Authentication__Schemes__Bearer__ValidAudiences__0=https://localhost:7289/api
      - Authentication__Schemes__Bearer__ValidIssuer=https://${AUTH0_DOMAIN:-YOUR_AUTH0_DOMAIN.auth0.com}/
    ports:
      - "7289:443"
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vastgoed-network
    volumes:
      - ./backend/logs:/app/logs

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: vastgoed-frontend
    ports:
      - "4200:443"
    depends_on:
      - api
    networks:
      - vastgoed-network
    environment:
      - apiUrl=http://api:80/api

volumes:
  sqlserver-data:

networks:
  vastgoed-network:
    driver: bridge
