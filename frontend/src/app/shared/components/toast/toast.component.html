<!-- src/app/shared/components/toast/toast.component.html -->
<div class="fixed top-4 right-4 z-50 space-y-2">
  @for (toast of toasts(); track toast.id) {
    <div [class]="getToastClasses(toast)" 
         [@slideIn]="true">
      
      <!-- Icon -->
      <div class="flex-shrink-0">
        <svg class="w-5 h-5 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getIcon(toast.type)"></path>
        </svg>
      </div>
      
      <!-- Content -->
      <div class="ml-3 flex-1">
        @if (toast.title) {
          <h4 class="text-sm font-semibold mb-1">{{ toast.title }}</h4>
        }
        <p class="text-sm">{{ toast.message }}</p>
      </div>
      
      <!-- Close button -->
      <button 
        (click)="removeToast(toast.id)"
        class="ml-3 flex-shrink-0 text-gray-400 hover:text-gray-600 focus:outline-none focus:text-gray-600 transition-colors duration-200">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
        </svg>
      </button>
    </div>
  }
</div>
