<div class="container mx-auto p-4">
  @if(isLoading) {
    <div class="flex items-center justify-center h-screen">
      <div class="animate-spin rounded-full h-32 w-32 border-b-2 border-blue-600"></div>
    </div>
  }
  
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Syndici</h1>
    <a routerLink="/syndici/add" class="bg-orange-600 text-white py-2 px-4 rounded hover:bg-orange-700">
      Nieuwe syndicus toevoegen
    </a>
  </div>
   

   
  <div class="bg-white shadow-md rounded-lg overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Naam</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Telefoon</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acties</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        @for (verhuurder of verhuurders; track verhuurder.id) {
          <tr>
            <td class="px-6 py-4 whitespace-nowrap">{{ verhuurder.naam }}</td>
            <td class="px-6 py-4 whitespace-nowrap">{{ verhuurder.email }}</td>
            <td class="px-6 py-4 whitespace-nowrap">{{ verhuurder.telefoon }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <a [routerLink]="['/syndici/edit', verhuurder.id]" class="text-indigo-600 hover:text-indigo-900 mr-4">
                Bewerken
              </a>
              <button (click)="deleteVerhuurder(verhuurder.id)" class="text-red-600 hover:text-red-900">
                Verwijderen
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" class="px-6 py-4 text-center text-gray-500">
              Geen syndici gevonden
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
