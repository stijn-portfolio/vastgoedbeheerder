<app-nav-bar></app-nav-bar>

<div class="container mx-auto px-4 py-6">
  <h1 class="text-3xl font-bold mb-6">Favorieten</h1>
  
  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
  </div>
  
  <div *ngIf="!loading && getFavoriteAssets().length === 0" class="bg-white rounded-lg shadow-md p-10 text-center">
    <p class="text-gray-600 mb-4">Je hebt nog geen favorieten toegevoegd.</p>
    <a routerLink="/assets" class="text-blue-600 hover:underline">Ga naar de asset lijst om favorieten toe te voegen →</a>
  </div>
  
  <div *ngIf="!loading && getFavoriteAssets().length > 0">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let asset of getFavoriteAssets()" class="bg-white rounded-lg shadow-md p-6">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 class="text-xl font-semibold">{{ asset.symbol }}</h2>
            <p class="text-gray-600">{{ asset.name }}</p>
          </div>
          <button (click)="removeFavorite(asset.id)" class="text-yellow-500 hover:text-yellow-600">
            <span class="text-xl">★</span>
          </button>
        </div>
        
        <div class="mb-4">
          <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full"
                [ngClass]="{'bg-blue-100 text-blue-800': asset.assetType === 'stock', 
                          'bg-green-100 text-green-800': asset.assetType === 'etf'}">
            {{ asset.assetType === 'stock' ? 'Aandeel' : 'ETF' }}
          </span>
        </div>
        
        <div class="flex justify-between items-end">
          <div>
            <p class="text-sm text-gray-500">Huidige prijs</p>
            <p class="text-2xl font-bold text-gray-900">€ {{ asset.currentPrice?.toFixed(2) || '0.00' }}</p>
          </div>
          
          <a routerLink="/transactions/add" [queryParams]="{assetId: asset.id}" 
             class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">
            Transactie
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
