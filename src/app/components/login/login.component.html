<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h1 class="text-2xl font-bold mb-6 text-center">Inloggen</h1>
      
      <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        {{ error }}
      </div>
      
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="mb-4">
          <label for="email" class="block text-gray-700 mb-2">E-mail</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            [(ngModel)]="loginData.email"
            #email="ngModel"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
            placeholder="voorbeeld@email.com">
          <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-red-500 mt-1">
            E-mail is verplicht
          </div>
        </div>
        
        <div class="mb-6">
          <label for="password" class="block text-gray-700 mb-2">Wachtwoord</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            [(ngModel)]="loginData.password"
            #password="ngModel"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500"
            placeholder="Wachtwoord">
          <div *ngIf="password.invalid && (password.dirty || password.touched)" class="text-red-500 mt-1">
            Wachtwoord is verplicht
          </div>
        </div>
        
        <button 
          type="submit" 
          [disabled]="loginForm.invalid || loading"
          class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 disabled:bg-blue-300">
          {{ loading ? 'Inloggen...' : 'Inloggen' }}
        </button>
      </form>
      
      <div class="mt-4 text-sm text-gray-600 text-center">
        <p>Demo accounts:</p>
        <p>Admin: admin&#64;example.com / admin123</p>
        <p>Gebruiker: user&#64;example.com / user123</p>
      </div>
    </div>
  </div>
