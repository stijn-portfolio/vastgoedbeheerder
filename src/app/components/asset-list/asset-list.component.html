<app-nav-bar></app-nav-bar>

<div class="container mx-auto px-4 py-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Aandelen & ETF's</h1>
    
    <div *ngIf="authService.isAdmin()">
      <a routerLink="/assets/add" class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">
        + Nieuw Aandeel
      </a>
    </div>
  </div>
  
  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
  </div>
  
  <div *ngIf="!loading" class="bg-white rounded-lg shadow-md">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Symbol</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Naam</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Prijs</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Favoriet</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actie</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let asset of assets">
        
<td class="px-6 py-4 whitespace-nowrap">
  <a [routerLink]="['/assets', asset.id]" class="text-sm font-medium text-blue-600 hover:text-blue-900">
    {{ asset.symbol }}
  </a>
</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm text-gray-900">{{ asset.name }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                    [ngClass]="{'bg-blue-100 text-blue-800': asset.assetType === 'stock', 
                              'bg-green-100 text-green-800': asset.assetType === 'etf'}">
                {{ asset.assetType === 'stock' ? 'Aandeel' : 'ETF' }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              € {{ asset.currentPrice?.toFixed(2) || '0.00' }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              <button (click)="toggleFavorite(asset)" class="focus:outline-none">
                <span [ngClass]="{'text-yellow-500': isFavorite(asset.id), 'text-gray-300': !isFavorite(asset.id)}">
                  {{ isFavorite(asset.id) ? '★' : '☆' }}
                </span>
              </button>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
              <div class="flex space-x-2">
                <a routerLink="/transactions/add" [queryParams]="{assetId: asset.id}" class="text-indigo-600 hover:text-indigo-900">Transactie</a>
                
                <ng-container *ngIf="authService.isAdmin()">
                  <span class="text-gray-300">|</span>
                  <a [routerLink]="['/assets/edit', asset.id]" class="text-blue-600 hover:text-blue-900">Bewerken</a>
                  <span class="text-gray-300">|</span>
                  <button (click)="deleteAsset(asset.id)" class="text-red-600 hover:text-red-900">Verwijderen</button>
                </ng-container>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
