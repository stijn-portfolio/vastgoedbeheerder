<app-nav-bar></app-nav-bar>

<div class="container mx-auto px-4 py-6">
  <h1 class="text-3xl font-bold mb-6">Nieuwe Transactie</h1>
  
  <div *ngIf="assetLoading" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
  </div>
  
  <div *ngIf="!assetLoading" class="bg-white rounded-lg shadow-md p-6">
    <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      {{ error }}
    </div>
    
    <form #transactionForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label for="assetId" class="block text-sm font-medium text-gray-700 mb-1">Aandeel</label>
        <select 
          id="assetId"
          name="assetId"
          [(ngModel)]="transaction.assetId"
          required
          (change)="onAssetChange()"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
          <option *ngFor="let asset of assets" [value]="asset.id">
            {{ asset.symbol }} - {{ asset.name }}
          </option>
        </select>
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
        <div class="flex space-x-4">
          <div class="flex items-center">
            <input 
              type="radio" 
              id="buy" 
              name="type" 
              value="buy" 
              [(ngModel)]="transaction.type"
              class="focus:ring-blue-500 h-4 w-4 text-blue-600 border-gray-300">
            <label for="buy" class="ml-2 block text-sm text-gray-700">Kopen</label>
          </div>
          <div class="flex items-center">
            <input 
              type="radio" 
              id="sell" 
              name="type" 
              value="sell" 
              [(ngModel)]="transaction.type"
              class="focus:ring-blue-500 h-4 w-4 text-blue-600 border-gray-300">
              <label for="sell" class="ml-2 block text-sm text-gray-700">Verkopen</label>
            </div>
          </div>
        </div>
        
        <div class="mb-4">
          <label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">Aantal</label>
          <input 
            type="number" 
            id="quantity" 
            name="quantity"
            [(ngModel)]="transaction.quantity"
            required
            min="1"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>
        
        <div class="mb-4">
          <label for="price" class="block text-sm font-medium text-gray-700 mb-1">Prijs per aandeel (€)</label>
          <input 
            type="number" 
            id="price" 
            name="price"
            [(ngModel)]="transaction.price"
            required
            min="0.01"
            step="0.01"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>
        
        <div class="mb-6">
          <label for="date" class="block text-sm font-medium text-gray-700 mb-1">Datum</label>
          <input 
            type="date" 
            id="date" 
            name="date"
            [(ngModel)]="transaction.date"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>
        
        <div class="mb-6 p-4 bg-gray-50 rounded-md">
          <h3 class="text-lg font-medium text-gray-900 mb-2">Overzicht</h3>
          <p class="text-gray-700">
            Totale waarde: <span class="font-bold">€ {{ (transaction.quantity * transaction.price).toFixed(2) }}</span>
          </p>
        </div>
        
        <div class="flex justify-between">
          <button 
            type="button" 
            routerLink="/transactions"
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 focus:outline-none">
            Annuleren
          </button>
          
          <button 
            type="submit" 
            [disabled]="transactionForm.invalid || loading"
            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none disabled:bg-blue-300">
            Transactie Toevoegen
          </button>
        </div>
      </form>
    </div>
  </div>
