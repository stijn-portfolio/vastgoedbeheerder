<nav class="bg-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4">
      <div class="flex justify-between items-center py-4">
        <div class="flex items-center">
          <span class="text-xl font-semibold">Beleggingsportfolio</span>
        </div>
        
        <!-- Desktop menu -->
        <div class="hidden md:flex items-center space-x-4">
          <a routerLink="/dashboard" 
             routerLinkActive="text-blue-200" 
             class="hover:text-blue-200">Dashboard</a>
          <a routerLink="/assets" 
             routerLinkActive="text-blue-200" 
             class="hover:text-blue-200">Aandelen</a>
          <a routerLink="/transactions" 
             routerLinkActive="text-blue-200" 
             class="hover:text-blue-200">Transacties</a>
          <a routerLink="/favorites" 
             routerLinkActive="text-blue-200" 
             class="hover:text-blue-200">Favorieten</a>
          
          <ng-container *ngIf="authService.isAdmin()">
            <a routerLink="/assets/add" 
               routerLinkActive="text-blue-200" 
               class="hover:text-blue-200">Aandeel Toevoegen</a>
          </ng-container>
          
          <button (click)="logout()" 
                  class="ml-4 bg-red-500 hover:bg-red-600 px-3 py-1 rounded">
            Uitloggen
          </button>
        </div>
        
        <!-- Mobile menu button -->
        <button (click)="toggleMenu()" class="md:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
      
      <!-- Mobile menu -->
      <div class="md:hidden" [ngClass]="{'hidden': !menuOpen}">
        <div class="flex flex-col space-y-3 pb-4">
          <a routerLink="/dashboard" 
             routerLinkActive="text-blue-200" 
             (click)="toggleMenu()"
             class="hover:text-blue-200">Dashboard</a>
          <a routerLink="/assets" 
             routerLinkActive="text-blue-200" 
             (click)="toggleMenu()"
             class="hover:text-blue-200">Aandelen</a>
          <a routerLink="/transactions" 
             routerLinkActive="text-blue-200" 
             (click)="toggleMenu()"
             class="hover:text-blue-200">Transacties</a>
          <a routerLink="/favorites" 
             routerLinkActive="text-blue-200" 
             (click)="toggleMenu()"
             class="hover:text-blue-200">Favorieten</a>
          
          <ng-container *ngIf="authService.isAdmin()">
            <a routerLink="/assets/add" 
               routerLinkActive="text-blue-200" 
               (click)="toggleMenu()"
               class="hover:text-blue-200">Aandeel Toevoegen</a>
          </ng-container>
          
          <button (click)="logout()" 
                  class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-left">
            Uitloggen
          </button>
        </div>
      </div>
    </div>
  </nav>
